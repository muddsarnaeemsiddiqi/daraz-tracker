<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daraz Price Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 380px; 
      min-height: 500px; 
      background: #f9fafb; 
    }
    .header {
      background: linear-gradient(to right, #f97316, #ea580c);
      color: white;
      padding: 16px;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 4px; }
    .header-title { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 18px; }
    .header-title svg { width: 20px; height: 20px; }
    .settings-btn { 
      background: rgba(255,255,255,0.2); 
      border: none; 
      border-radius: 6px; 
      padding: 6px; 
      cursor: pointer;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.3); }
    .settings-btn svg { width: 16px; height: 16px; color: white; }
    .tabs { display: flex; gap: 8px; margin-top: 12px; }
    .tab {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .tab-active { background: white; color: #ea580c; }
    .tab-inactive { background: rgba(255,255,255,0.2); color: white; }
    .tab-inactive:hover { background: rgba(255,255,255,0.3); }
    .settings-panel { background: white; padding: 16px; border-bottom: 1px solid #e5e7eb; }
    .settings-title { font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
    .form-select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .premium-box {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px;
    }
    .premium-header { display: flex; align-items: center; gap: 8px; color: #92400e; font-weight: 500; font-size: 14px; }
    .premium-header svg { width: 16px; height: 16px; }
    .premium-text { font-size: 12px; color: #b45309; margin-top: 4px; }
    .premium-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #d97706;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .premium-btn:hover { background: #b45309; }
    .content { padding: 16px; }
    .product-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .product-card:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .product-row { display: flex; gap: 12px; }
    .product-img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; background: #f3f4f6; }
    .product-img-placeholder {
      width: 64px; height: 64px; border-radius: 8px; background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
    }
    .product-img-placeholder svg { width: 24px; height: 24px; color: #9ca3af; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-size: 14px; font-weight: 500; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-price-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .product-price { font-size: 18px; font-weight: bold; color: #111827; }
    .price-change { font-size: 12px; display: flex; align-items: center; gap: 2px; }
    .price-drop { color: #16a34a; }
    .price-up { color: #dc2626; }
    .price-change svg { width: 12px; height: 12px; }
    .product-range { display: flex; gap: 12px; margin-top: 4px; font-size: 12px; color: #6b7280; }
    .delete-btn { background: none; border: none; padding: 4px; cursor: pointer; color: #9ca3af; }
    .delete-btn:hover { color: #ef4444; }
    .delete-btn svg { width: 16px; height: 16px; }
    .view-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
    }
    .view-link:hover { color: #1d4ed8; }
    .view-link svg { width: 12px; height: 12px; }
    .empty-state { text-align: center; padding: 32px 16px; color: #6b7280; }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }
    .empty-link { color: #ea580c; font-size: 14px; text-decoration: underline; cursor: pointer; }
    .limit-warning {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      color: #92400e;
      margin-bottom: 12px;
    }
    .limit-link { font-weight: 500; text-decoration: underline; cursor: pointer; }
    .add-section { text-align: center; padding: 16px 0; }
    .add-section p { font-size: 14px; color: #4b5563; margin-bottom: 16px; }
    .track-btn {
      width: 100%;
      padding: 12px;
      background: #ea580c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .track-btn:hover { background: #c2410c; }
    .track-btn svg { width: 16px; height: 16px; }
    .divider { display: flex; align-items: center; margin: 16px 0; }
    .divider-line { flex: 1; height: 1px; background: #e5e7eb; }
    .divider-text { padding: 0 12px; font-size: 12px; color: #6b7280; }
    .url-row { display: flex; gap: 8px; }
    .url-input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .url-input:focus { outline: none; border-color: #ea580c; }
    .add-url-btn { padding: 8px 16px; background: #111827; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .add-url-btn:hover { background: #1f2937; }
    .view-all-btn { width: 100%; padding: 8px; font-size: 14px; color: #4b5563; background: none; border: none; cursor: pointer; }
    .view-all-btn:hover { color: #111827; }
    .product-actions { display: flex; flex-direction: column; gap: 4px; }
    .action-btn { background: none; border: none; padding: 4px; cursor: pointer; color: #9ca3af; }
    .action-btn:hover { color: #ea580c; }
    .action-btn svg { width: 14px; height: 14px; }
    .product-links { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .edit-link { background: none; border: none; font-size: 12px; color: #6b7280; cursor: pointer; text-decoration: underline; }
    .edit-link:hover { color: #ea580c; }
    .premium-email-row { display: flex; gap: 8px; margin-top: 8px; }
    .premium-email-input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .premium-email-input:focus { outline: none; border-color: #d97706; }
    .premium-btn-small { padding: 8px 12px; background: #d97706; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .premium-btn-small:hover { background: #b45309; }
    .premium-hint { font-size: 11px; color: #9ca3af; margin-top: 8px; }
    .premium-error { color: #dc2626; font-size: 12px; margin-top: 8px; }
    .premium-success { color: #16a34a; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
